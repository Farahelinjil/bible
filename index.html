<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الإنجيل المقدس - المطران أنطوان ناصيف</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Noto+Serif+Arabic:wght@400;700&display=swap');
        :root { --clerical-red: #8B0000; --liturgical-gold: #D4AF37; --sacred-white: #FCF9F2; }
        body { font-family: 'Noto Serif Arabic', serif; background-color: var(--sacred-white); color: #2D2D2D; }
        .bishop-header { background: linear-gradient(135deg, #8B0000 0%, #4A0000 100%); border-bottom: 5px solid var(--liturgical-gold); }
        .gospel-card { background: white; border: 1px solid #E5E1DA; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; border-radius: 1rem; }
        .gospel-card.active { border-color: var(--clerical-red); background-color: #FFF5F5; transform: scale(1.02); box-shadow: 0 10px 15px -3px rgba(139, 0, 0, 0.1); }
        .chapter-btn { aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; border: 1px solid #D4AF37; border-radius: 10px; font-weight: bold; background: white; cursor: pointer; transition: 0.2s; }
        .chapter-btn.has-audio { border: 2px solid var(--clerical-red); color: var(--clerical-red); background: #FFF5F5; }
        .chapter-btn:hover { background: #FDE68A; }
    </style>
</head>
<body class="min-h-screen pb-32">

    <header class="bishop-header text-white py-16 px-4 text-center shadow-xl">
        <h1 class="text-5xl font-bold mb-3 text-[#D4AF37]" style="font-family: 'Amiri', serif;">الإنجيل المقدس</h1>
        <p class="text-2xl font-light opacity-90">بصوت سيادة المطران أنطوان ناصيف</p>
        <div class="mt-4 inline-block px-4 py-1 bg-black/20 rounded-full text-sm italic font-amiri">باللهجة اللبنانية العاميّة</div>
    </header>

    <main class="container mx-auto px-4 mt-12 max-w-5xl">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-12">
            <div onclick="ui.selectGospel('matthew')" id="tab-matthew" class="gospel-card p-6 text-center">
                <h2 class="text-2xl font-bold text-[#8B0000]">بشارة متى</h2>
                <p class="text-xs text-gray-400 mt-1 uppercase tracking-widest">Matthew</p>
            </div>
            <div onclick="ui.selectGospel('mark')" id="tab-mark" class="gospel-card p-6 text-center">
                <h2 class="text-2xl font-bold text-[#8B0000]">بشارة مرقس</h2>
                <p class="text-xs text-gray-400 mt-1 uppercase tracking-widest">Mark</p>
            </div>
            <div onclick="ui.selectGospel('luke')" id="tab-luke" class="gospel-card p-6 text-center">
                <h2 class="text-2xl font-bold text-[#8B0000]">بشارة لوقا</h2>
                <p class="text-xs text-gray-400 mt-1 uppercase tracking-widest">Luke</p>
            </div>
            <div onclick="ui.selectGospel('john')" id="tab-john" class="gospel-card p-6 text-center">
                <h2 class="text-2xl font-bold text-[#8B0000]">بشارة يوحنا</h2>
                <p class="text-xs text-gray-400 mt-1 uppercase tracking-widest">John</p>
            </div>
        </div>

        <div id="chapters-container" class="hidden bg-white p-8 rounded-3xl shadow-sm border border-gray-100">
            <div class="flex justify-between items-center border-b-2 border-amber-100 mb-8 pb-4">
                <h3 id="current-gospel-name" class="text-3xl font-bold text-[#8B0000]"></h3>
                <span class="text-amber-600 font-bold">اختر الفصل للاستماع</span>
            </div>
            <div id="chapters-grid" class="grid grid-cols-4 sm:grid-cols-6 md:grid-cols-10 gap-4"></div>
        </div>
    </main>

    <div id="player-bar" class="fixed bottom-0 left-0 right-0 bg-white border-t-4 border-[#D4AF37] p-6 shadow-[0_-10px_25px_rgba(0,0,0,0.1)] transform translate-y-full transition-transform duration-500 z-50">
        <div class="max-w-4xl mx-auto flex flex-col md:flex-row items-center gap-4">
            <div class="flex-1 text-center md:text-right">
                <p id="now-playing" class="font-bold text-[#8B0000] text-xl"></p>
                <audio id="audio-element" controls class="mt-2 w-full"></audio>
            </div>
            <button onclick="ui.hidePlayer()" class="text-gray-400 hover:text-red-600 text-3xl p-2">&times;</button>
        </div>
    </div>

    <script>
        const GOSPEL_DATA = {
            matthew: { name: "بشارة متى", max: 28 },
            mark: { name: "بشارة مرقس", max: 16 },
            luke: { name: "بشارة لوقا", max: 24 },
            john: { name: "بشارة يوحنا", max: 21 }
        };

        window.ui = {
            selectGospel(id) {
                window.selectedGospel = id;
                document.getElementById('chapters-container').classList.remove('hidden');
                document.getElementById('current-gospel-name').innerText = GOSPEL_DATA[id].name;
                document.querySelectorAll('.gospel-card').forEach(c => c.classList.remove('active'));
                document.getElementById(`tab-${id}`).classList.add('active');

                const grid = document.getElementById('chapters-grid');
                grid.innerHTML = '';
                for (let i = 1; i <= GOSPEL_DATA[id].max; i++) {
                    const btn = document.createElement('div');
                    // جعلنا جميع الأزرار نشطة للبحث في مجلد audio
                    btn.className = `chapter-btn has-audio shadow-sm`;
                    btn.innerText = i;
                    btn.onclick = () => this.playChapter(id, i);
                    grid.appendChild(btn);
                }
            },

            playChapter(id, ch) {
                document.getElementById('now-playing').innerText = `استماع: ${GOSPEL_DATA[id].name} - الفصل ${ch}`;
                document.getElementById('player-bar').classList.remove('translate-y-full');
                
                const audio = document.getElementById('audio-element');
                // الربط مع المجلد الذي أنشأته على GitHub
                // ملاحظة: تأكد من تسمية الملفات مثل matthew-1.mp3
                audio.src = `audio/${id}-${ch}.mp3`;
                
                audio.play().catch(e => {
                    alert("عذراً، الملف الصوتي لهذا الفصل غير متوفر حالياً في المجلد.");
                    console.error("Audio error:", e);
                });
            },

            hidePlayer() {
                document.getElementById('player-bar').classList.add('translate-y-full');
                document.getElementById('audio-element').pause();
            }
        };
    </script>
</body>
</html>
